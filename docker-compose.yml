# Run the Nuco relay with TLS terminated by Caddy (automatic Let's Encrypt). Clone the
# protocol and nuco-server repos side by side, then from the nuco-server folder run:
#   docker compose up -d
# Point the app's custom server setting at wss://your-domain.
#
# The build context is the parent folder so the shared protocol package is included.

services:
  relay:
    build:
      context: ..
      dockerfile: nuco-server/Dockerfile
    restart: unless-stopped
    environment:
      - RELAY_HOST=0.0.0.0
      - RELAY_PORT=8787
      - RELAY_SQLITE_PATH=/data/nuco.sqlite
      # iOS push (optional). Mount your .p8 below and fill these in to enable APNs.
      # - APNS_KEY_PATH=/secrets/AuthKey.p8
      # - APNS_KEY_ID=ABC123DEFG
      # - APNS_TEAM_ID=TEAM123456
      # - APNS_BUNDLE_ID=com.zlsoftware.nuco
      # - APNS_HOST=api.push.apple.com
      # Voice calls (optional). Requires the coturn service below; see README "Voice
      # calls (TURN)". TURN_SECRET comes from .env and MUST equal static-auth-secret in
      # coturn/turnserver.conf. Use your own turn subdomain in the urls.
      # - RELAY_TURN_SECRET=${TURN_SECRET}
      # - RELAY_TURN_URLS=turn:turn.example.org:3478?transport=udp,turn:turn.example.org:3478?transport=tcp
      # - RELAY_TURN_TTL_SECONDS=7200
    volumes:
      - relay-data:/data
      # - ./secrets/AuthKey.p8:/secrets/AuthKey.p8:ro
    expose:
      - '8787'

  # TURN server for voice calls. Opt in: copy coturn/turnserver.conf.example to
  # coturn/turnserver.conf, set the shared secret, then start with
  #   docker compose --profile calls up -d
  # Host networking is used because coturn needs a contiguous UDP relay port range
  # (publishing hundreds of UDP ports through the Docker proxy is slow) and must see real
  # client source addresses. If your host cannot use host networking, replace it with:
  #   ports: ['3478:3478/udp', '3478:3478/tcp', '49160-49360:49160-49360/udp']
  # The secret lives in the mounted conf file, not on the command line, so it never shows
  # up in docker inspect.
  coturn:
    image: coturn/coturn:4
    restart: unless-stopped
    network_mode: host
    profiles:
      - calls
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - relay

volumes:
  relay-data:
  caddy-data:
  caddy-config:
